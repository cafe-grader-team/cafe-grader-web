contest_a:
  name: contest_a
  description: Contest A
  enabled: true
  start: <%= 1.hour.ago.to_fs(:db) %>
  stop: <%= 3.hours.from_now.to_fs(:db) %>

contest_b:
  name: contest_b
  description: Contest B
  enabled: true
  start: <%= 2.hours.ago.to_fs(:db) %>
  stop: <%= 2.hours.from_now.to_fs(:db) %>

contest_c:
  name: contest_c
  description: Contest C
  enabled: false
  start: <%= 1.day.ago.to_fs(:db) %>
  stop: <%= (1.day.ago + 4.hours).to_fs(:db) %>

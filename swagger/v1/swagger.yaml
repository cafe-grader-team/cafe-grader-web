---
openapi: 3.0.1
info:
  title: Cafe Grader API
  version: v1
  description: API for the Cafe Grader online judge platform
paths:
  "/api/v1/auth/login":
    post:
      summary: Log in and receive a JWT token
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: login successful
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  token:
                    type: string
                    description: JWT token
                  expires_at:
                    type: string
                    format: date-time
                    description: Token expiry (12 hours after issue); re-login to
                      obtain a fresh token
                  user:
                    type: object
                    additionalProperties: false
                    properties:
                      id:
                        type: integer
                      login:
                        type: string
                      full_name:
                        type: string
                required:
                - token
                - expires_at
                - user
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
        '403':
          description: account disabled
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
        '429':
          description: too many login attempts (rate limited per client IP)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                  description: Username
                password:
                  type: string
                  description: Password
              required:
              - login
              - password
  "/api/v1/contests/{id}":
    get:
      summary: Get contest info
      tags:
      - Contests
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: contest found
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  description:
                    type: string
                    nullable: true
                  start:
                    type: string
                    format: date-time
                    nullable: true
                  stop:
                    type: string
                    format: date-time
                    nullable: true
                  finalized:
                    type: boolean
                  status:
                    type: string
                required:
                - id
                - name
        '404':
          description: contest not found or not accessible
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
  "/api/v1/contests/{id}/problems":
    get:
      summary: List problems in a contest
      tags:
      - Contests
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: problems list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    full_name:
                      type: string
                    difficulty:
                      type: integer
                      nullable: true
                    tags:
                      type: array
                      items:
                        type: string
                    submission_count:
                      type: integer
                    best_score:
                      type: number
                      nullable: true
                    last_score:
                      type: number
                      nullable: true
                    last_result:
                      type: string
                      nullable: true
                    last_submission_time:
                      type: string
                      format: date-time
                      nullable: true
                    last_submission_id:
                      type: integer
                      nullable: true
                      description: Id of the user's latest submission for this problem
                        — fetch details via /api/v1/submissions/{id}
                    has_testcase:
                      type: boolean
                    has_attachment:
                      type: boolean
                    permitted_languages:
                      type: array
                      nullable: true
                      items:
                        type: object
                        additionalProperties: false
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          ext:
                            type: string
                      description: Allowed languages, or null if all are allowed
  "/api/v1/problems/{problem_id}/datasets":
    parameters:
    - name: problem_id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: List a problem's datasets
      tags:
      - Datasets
      description: 'Editor view: every dataset of the problem with settings, files
        and live flag.'
      security:
      - bearer: []
      responses:
        '200':
          description: datasets listed
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/DatasetAdmin"
        '403':
          description: not an editor of this problem
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: unknown problem
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a dataset
      tags:
      - Datasets
      security:
      - bearer: []
      parameters: []
      responses:
        '201':
          description: dataset created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DatasetAdmin"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/DatasetPayload"
  "/api/v1/datasets/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    patch:
      summary: Update dataset settings
      tags:
      - Datasets
      description: JSON settings only — upload files via POST /datasets/{id}/files.
      security:
      - bearer: []
      parameters: []
      responses:
        '200':
          description: dataset updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DatasetAdmin"
        '404':
          description: unknown dataset
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/DatasetPayload"
    delete:
      summary: Delete a dataset
      tags:
      - Datasets
      description: Refused (409) for the live dataset and for the problem's only dataset.
      security:
      - bearer: []
      responses:
        '204':
          description: dataset deleted
        '409':
          description: cannot delete the live dataset
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/datasets/{id}/set_live":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Make this the live (grading) dataset
      tags:
      - Datasets
      security:
      - bearer: []
      responses:
        '200':
          description: live dataset switched
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DatasetAdmin"
  "/api/v1/datasets/{id}/files":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Upload dataset files
      tags:
      - Datasets
      description: Attach a checker and/or compile/run support files. Workers' cached
        copies are invalidated.
      security:
      - bearer: []
      parameters: []
      responses:
        '200':
          description: files attached
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DatasetAdmin"
        '422':
          description: no files given
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationError"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        description: Custom checker script (used with custom_* evaluation types)
  "/api/v1/datasets/{id}/files/{attachment_id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    - name: attachment_id
      in: path
      required: true
      schema:
        type: integer
    delete:
      summary: Delete a dataset file
      tags:
      - Datasets
      description: attachment_id comes from the files section of the dataset JSON.
      security:
      - bearer: []
      responses:
        '200':
          description: file removed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/DatasetAdmin"
        '404':
          description: unknown attachment
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/languages":
    get:
      summary: List all available languages
      tags:
      - Languages
      security:
      - bearer: []
      responses:
        '200':
          description: languages list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    pretty_name:
                      type: string
                    ext:
                      type: string
                  required:
                  - id
                  - name
                  - pretty_name
                  - ext
  "/api/v1/problems":
    get:
      summary: List all accessible problems
      tags:
      - Problems
      security:
      - bearer: []
      responses:
        '200':
          description: problems list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    full_name:
                      type: string
                    difficulty:
                      type: integer
                      nullable: true
                    tags:
                      type: array
                      items:
                        type: string
                    submission_count:
                      type: integer
                    best_score:
                      type: number
                      nullable: true
                    last_score:
                      type: number
                      nullable: true
                    last_result:
                      type: string
                      nullable: true
                    last_submission_time:
                      type: string
                      format: date-time
                      nullable: true
                    last_submission_id:
                      type: integer
                      nullable: true
                      description: Id of the user's latest submission for this problem
                        — fetch details via /api/v1/submissions/{id}
                    has_testcase:
                      type: boolean
                    has_attachment:
                      type: boolean
                    permitted_languages:
                      type: array
                      nullable: true
                      items:
                        type: object
                        additionalProperties: false
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          ext:
                            type: string
                      description: Allowed languages, or null if all are allowed
    post:
      summary: Create a problem
      tags:
      - Problems (manage)
      description: Admin or group editor. Creates the problem together with a default
        dataset and live-dataset pointer (a dataset-less problem is invisible to manage
        views).
      security:
      - bearer: []
      parameters: []
      responses:
        '201':
          description: problem created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemAdmin"
        '403':
          description: not an editor
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: validation failure (e.g. duplicate name)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationError"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ProblemPayload"
  "/api/v1/problems/{id}":
    get:
      summary: Get problem detail
      tags:
      - Problems
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: problem detail
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  full_name:
                    type: string
                  full_score:
                    type: integer
                    nullable: true
                  difficulty:
                    type: integer
                    nullable: true
                  tags:
                    type: array
                    items:
                      type: string
                  submission_count:
                    type: integer
                  best_score:
                    type: number
                    nullable: true
                  last_score:
                    type: number
                    nullable: true
                  last_result:
                    type: string
                    nullable: true
                  last_submission_time:
                    type: string
                    format: date-time
                    nullable: true
                  last_submission_id:
                    type: integer
                    nullable: true
                    description: Id of the user's latest submission for this problem
                      — fetch details via /api/v1/submissions/{id}
                  has_testcase:
                    type: boolean
                  has_attachment:
                    type: boolean
                  permitted_languages:
                    type: array
                    nullable: true
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        ext:
                          type: string
                    description: Allowed languages, or null if all are allowed
                  submission_ids:
                    type: array
                    items:
                      type: integer
                required:
                - id
                - name
                - full_name
                - submission_count
                - submission_ids
        '404':
          description: problem not found
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    patch:
      summary: Update problem settings
      tags:
      - Problems (manage)
      description: Requires edit permission on the problem (admin, or group editor
        of one of its groups in group mode).
      security:
      - bearer: []
      parameters: []
      responses:
        '200':
          description: problem updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemAdmin"
        '403':
          description: no edit permission on this problem
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: unknown problem
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/ProblemPayload"
    delete:
      summary: Delete a problem
      tags:
      - Problems (manage)
      description: Destroys the problem with its datasets, testcases and submissions
        (mirrors the web admin action).
      security:
      - bearer: []
      responses:
        '204':
          description: problem deleted
        '403':
          description: no edit permission
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/problems/{id}/description":
    get:
      summary: Get problem description (markdown)
      tags:
      - Problems
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: description returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  markdown:
                    type: boolean
                  description:
                    type: string
                    nullable: true
  "/api/v1/problems/{id}/files/{type}":
    get:
      summary: Get problem file by type
      tags:
      - Problems
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      - name: type
        in: path
        required: true
        enum:
        - pdf
        - attachment
        - checker
        - manager
        description: "File type to retrieve:\n * `pdf` \n * `attachment` \n * `checker`
          \n * `manager` \n "
        schema:
          type: string
      responses:
        '404':
          description: file not found
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
        '400':
          description: unknown file type
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
        '403':
          description: viva problem PDF blocked for students
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
  "/api/v1/problems/{id}/testcases":
    get:
      summary: List testcase metadata for a problem
      tags:
      - Problems
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: testcase metadata list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                      description: Global testcase id — pass this as {id} to /api/v1/testcases/{id}/input
                        and /api/v1/testcases/{id}/sol
                    num:
                      type: integer
                      description: Display number within the problem (1, 2, 3, …)
                        — not usable as {id} for the download endpoints
                    group:
                      type: integer
                      nullable: true
                      description: Testcase group number
                    group_name:
                      type: string
                      nullable: true
                      description: Testcase group name
                    weight:
                      type: integer
                      nullable: true
                      description: Score weight of this testcase
                  required:
                  - id
                  - num
        '403':
          description: testcase viewing not allowed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
  "/api/v1/problems/{id}/statement":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    put:
      summary: Upload or replace the statement PDF
      tags:
      - Problems (manage)
      security:
      - bearer: []
      parameters: []
      responses:
        '200':
          description: statement uploaded
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProblemAdmin"
        '422':
          description: not a PDF
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationError"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
        description: PDF file (content type must be application/pdf)
  "/api/v1/problems/{problem_id}/submissions":
    get:
      summary: List user's submissions for a problem
      tags:
      - Submissions
      security:
      - bearer: []
      parameters:
      - name: problem_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: submissions list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                    number:
                      type: integer
                    language:
                      type: string
                    submitted_at:
                      type: string
                      format: date-time
                    points:
                      type: number
                      nullable: true
                    status:
                      type: string
                      nullable: true
                    grader_comment:
                      type: string
                      nullable: true
    post:
      summary: Submit code to a problem
      tags:
      - Submissions
      security:
      - bearer: []
      parameters:
      - name: problem_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '201':
          description: submission created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: integer
                  number:
                    type: integer
                  status:
                    type: string
                required:
                - id
                - number
                - status
        '422':
          description: missing source code
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  description: Source code
                filename:
                  type: string
                  description: Filename (for language detection)
                language_id:
                  type: integer
                  description: Language ID
              required:
              - source
  "/api/v1/submissions/{id}":
    get:
      summary: Get submission detail
      tags:
      - Submissions
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: submission detail
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: integer
                  problem_id:
                    type: integer
                  problem_name:
                    type: string
                  user_id:
                    type: integer
                  language:
                    type: string
                  source:
                    type: string
                    nullable: true
                  source_filename:
                    type: string
                    nullable: true
                  submitted_at:
                    type: string
                    format: date-time
                  points:
                    type: number
                    nullable: true
                  status:
                    type: string
                    nullable: true
                  grader_comment:
                    type: string
                    nullable: true
                  compiler_message:
                    type: string
                    nullable: true
                  max_runtime:
                    type: number
                    nullable: true
                  peak_memory:
                    type: integer
                    nullable: true
                  number:
                    type: integer
                  evaluations:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        testcase_id:
                          type: integer
                        result:
                          type: string
                          nullable: true
                        score:
                          type: number
                          nullable: true
                        time:
                          type: integer
                          nullable: true
                        memory:
                          type: integer
                          nullable: true
                required:
                - id
                - problem_id
                - language
                - submitted_at
        '404':
          description: submission not found
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
  "/api/v1/testcases/{id}/input":
    get:
      summary: Download testcase input file
      tags:
      - Testcases
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: input file content
        '404':
          description: testcase not found (body hints to use the global id from /problems/{id}/testcases,
            not num)
        '403':
          description: not allowed to view testcase
  "/api/v1/testcases/{id}/sol":
    get:
      summary: Download testcase solution file
      tags:
      - Testcases
      security:
      - bearer: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: solution file content
        '404':
          description: testcase not found (body hints to use the global id from /problems/{id}/testcases,
            not num)
        '403':
          description: not allowed to view testcase
  "/api/v1/datasets/{dataset_id}/testcases":
    parameters:
    - name: dataset_id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Add a testcase
      tags:
      - Testcases (manage)
      description: input/sol accept file uploads or plain-text fields (CRLF is normalized
        to LF, matching the zip importer). num defaults to the next free number. Workers'
        cached copy of the dataset is invalidated.
      security:
      - bearer: []
      parameters: []
      responses:
        '201':
          description: testcase created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TestcaseAdmin"
        '422':
          description: missing content
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationError"
        '404':
          description: unknown dataset
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
        description: Input data (file or text field)
  "/api/v1/testcases/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    patch:
      summary: Update a testcase
      tags:
      - Testcases (manage)
      description: Metadata, and/or content replacement via the input/sol fields.
        Content changes invalidate workers' cached dataset; metadata-only changes
        don't need to (scoring reads the database).
      security:
      - bearer: []
      parameters: []
      responses:
        '200':
          description: testcase updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TestcaseAdmin"
        '403':
          description: not an editor
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: unknown testcase
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/TestcasePayload"
    delete:
      summary: Delete a testcase
      tags:
      - Testcases (manage)
      security:
      - bearer: []
      responses:
        '204':
          description: testcase deleted
  "/api/v1/problems/{id}/testcases/import":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Bulk-import testcases from a zip
      tags:
      - Testcases (manage)
      description: Zip of paired files matched by input_pattern/sol_pattern (defaults
        *.in / *.sol). Without dataset_id a new dataset is created (and becomes live
        if the problem had none); with dataset_id, cases with matching code names
        are replaced in that dataset. Emits one consolidated `import_testcases` audit
        row.
      security:
      - bearer: []
      parameters: []
      responses:
        '200':
          description: testcases imported into a new dataset
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  problem_id:
                    type: integer
                  dataset_id:
                    type: integer
                    nullable: true
                  dataset_name:
                    type: string
                    nullable: true
                  testcase_count:
                    type: integer
                  log:
                    type: array
                    items:
                      type: string
                required:
                - problem_id
                - testcase_count
                - log
        '422':
          description: not a valid zip
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationError"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
        description: Zip archive
  "/api/v1/users":
    get:
      summary: List users
      tags:
      - Users (admin)
      security:
      - bearer: []
      parameters:
      - name: q
        in: query
        required: false
        description: Substring filter on login or full name
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: 1-based (default 1)
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Default 50, max 200
        schema:
          type: integer
      responses:
        '200':
          description: users listed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  users:
                    type: array
                    items:
                      "$ref": "#/components/schemas/UserAdmin"
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      page:
                        type: integer
                      per_page:
                        type: integer
                      total:
                        type: integer
                    required:
                    - page
                    - per_page
                    - total
                required:
                - users
                - meta
        '403':
          description: not an admin
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create a user
      tags:
      - Users (admin)
      description: The account is created activated (mirrors the web admin form).
      security:
      - bearer: []
      parameters: []
      responses:
        '201':
          description: user created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UserAdmin"
        '422':
          description: validation failure (duplicate login, short password, ...)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationError"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UserPayload"
  "/api/v1/users/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Get a user
      tags:
      - Users (admin)
      security:
      - bearer: []
      responses:
        '200':
          description: user detail
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UserAdmin"
        '404':
          description: unknown user
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Update a user
      tags:
      - Users (admin)
      security:
      - bearer: []
      parameters: []
      responses:
        '200':
          description: user updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UserAdmin"
        '403':
          description: not an admin
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/UserPayload"
    delete:
      summary: Delete a user
      tags:
      - Users (admin)
      description: Refused for your own account.
      security:
      - bearer: []
      responses:
        '204':
          description: user deleted
        '422':
          description: cannot delete yourself
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/v1/me":
    get:
      summary: Get current user profile
      tags:
      - User
      security:
      - bearer: []
      responses:
        '200':
          description: user profile
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: integer
                  login:
                    type: string
                  full_name:
                    type: string
                  alias:
                    type: string
                    nullable: true
                  email:
                    type: string
                    nullable: true
                  section:
                    type: string
                    nullable: true
                  remark:
                    type: string
                    nullable: true
                  admin:
                    type: boolean
                required:
                - id
                - login
                - full_name
                - admin
        '401':
          description: missing or invalid token
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  error:
                    type: string
servers:
- url: "{server}"
  variables:
    server:
      default: https://your-server.example.com
      description: Server URL
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
        hint:
          type: string
      required:
      - error
    ValidationError:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: string
      required:
      - error
    Attachment:
      type: object
      additionalProperties: false
      nullable: true
      properties:
        id:
          type: integer
          description: Attachment id (use with the file delete endpoint)
        filename:
          type: string
        byte_size:
          type: integer
      required:
      - id
      - filename
      - byte_size
    DatasetAdmin:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        problem_id:
          type: integer
        name:
          type: string
        live:
          type: boolean
          description: Whether this is the problem's live (grading) dataset
        time_limit:
          type: number
          nullable: true
          description: Seconds
        memory_limit:
          type: integer
          nullable: true
          description: MB
        score_type:
          type: string
          enum:
          - sum
          - group_min
          - raw_sum
        evaluation_type:
          type: string
          enum:
          - default
          - exact
          - relative
          - custom_cafe
          - custom_cms
          - postgres
          - custom_cms_raw
        score_param:
          type: string
          nullable: true
        main_filename:
          type: string
          nullable: true
        initializer_filename:
          type: string
          nullable: true
        testcase_count:
          type: integer
        files:
          type: object
          additionalProperties: false
          properties:
            checker:
              "$ref": "#/components/schemas/Attachment"
            managers:
              type: array
              items:
                "$ref": "#/components/schemas/Attachment"
            data_files:
              type: array
              items:
                "$ref": "#/components/schemas/Attachment"
            initializers:
              type: array
              items:
                "$ref": "#/components/schemas/Attachment"
      required:
      - id
      - problem_id
      - name
      - live
      - score_type
      - evaluation_type
      - testcase_count
      - files
    DatasetPayload:
      type: object
      properties:
        dataset:
          type: object
          properties:
            name:
              type: string
              description: Defaults to the next free "Dataset N" on create
            time_limit:
              type: number
              description: Seconds
            memory_limit:
              type: integer
              description: MB
            score_type:
              type: string
              enum:
              - sum
              - group_min
              - raw_sum
            evaluation_type:
              type: string
              enum:
              - default
              - exact
              - relative
              - custom_cafe
              - custom_cms
              - postgres
              - custom_cms_raw
            score_param:
              type: string
            main_filename:
              type: string
            initializer_filename:
              type: string
    UserAdmin:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        login:
          type: string
        full_name:
          type: string
        alias:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        remark:
          type: string
          nullable: true
        enabled:
          type: boolean
          nullable: true
        activated:
          type: boolean
          nullable: true
        roles:
          type: array
          items:
            type: string
          description: 'Read-only: roles are granted via the web UI only'
        group_ids:
          type: array
          items:
            type: integer
      required:
      - id
      - login
      - full_name
      - roles
      - group_ids
    UserPayload:
      type: object
      properties:
        user:
          type: object
          properties:
            login:
              type: string
              description: 3-30 chars, letters/digits/underscore
            password:
              type: string
              description: 4-50 chars. Blank on update keeps the current password.
            password_confirmation:
              type: string
            full_name:
              type: string
            email:
              type: string
            alias:
              type: string
            remark:
              type: string
            enabled:
              type: boolean
              description: Disabled users cannot log in or hold API tokens
            group_ids:
              type: array
              items:
                type: integer
      required:
      - user
    TestcaseAdmin:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
        dataset_id:
          type: integer
        problem_id:
          type: integer
        num:
          type: integer
        group:
          type: integer
          nullable: true
        group_name:
          type: string
          nullable: true
        weight:
          type: integer
          nullable: true
        code_name:
          type: string
          nullable: true
      required:
      - id
      - dataset_id
      - num
    TestcasePayload:
      type: object
      properties:
        testcase:
          type: object
          properties:
            num:
              type: integer
              description: Defaults to the next free number on create. Display order
                is (group, num).
            group:
              type: integer
            group_name:
              type: string
            weight:
              type: integer
            code_name:
              type: string
        input:
          type: string
          description: Replacement input content (CRLF is normalized to LF)
        sol:
          type: string
          description: Replacement expected-output content
    ProblemPayload:
      type: object
      properties:
        problem:
          type: object
          properties:
            name:
              type: string
              description: Short name (letters, numbers, ()[]-_ only); must be unique
            full_name:
              type: string
              description: Display name (defaults to name on create)
            available:
              type: boolean
              description: Visible/submittable for students (default false on create)
            date_added:
              type: string
              format: date
            test_allowed:
              type: boolean
            output_only:
              type: boolean
            difficulty:
              type: integer
            submission_filename:
              type: string
            compilation_type:
              type: string
              enum:
              - self_contained
              - with_managers
              - viva_exam
            view_testcase:
              type: boolean
            view_submission:
              type: boolean
            markdown:
              type: boolean
            description:
              type: string
            url:
              type: string
            tag_ids:
              type: array
              items:
                type: integer
            group_ids:
              type: array
              items:
                type: integer
              description: Groups the problem belongs to. Editors keep edit access
                through their groups, so include one of yours.
            permitted_language_ids:
              type: array
              items:
                type: integer
              description: Restrict submittable languages; empty array allows all
      required:
      - problem
    ProblemAdmin:
      type: object
      additionalProperties: false
      description: Management view of a problem (editor/admin endpoints)
      properties:
        id:
          type: integer
        name:
          type: string
        full_name:
          type: string
        full_score:
          type: integer
          nullable: true
        available:
          type: boolean
        test_allowed:
          type: boolean
          nullable: true
        output_only:
          type: boolean
          nullable: true
        view_testcase:
          type: boolean
          nullable: true
        view_submission:
          type: boolean
          nullable: true
        markdown:
          type: boolean
          nullable: true
        difficulty:
          type: integer
          nullable: true
        date_added:
          type: string
          format: date
          nullable: true
        url:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        submission_filename:
          type: string
          nullable: true
        compilation_type:
          type: string
          enum:
          - self_contained
          - with_managers
          - viva_exam
        live_dataset_id:
          type: integer
          nullable: true
        permitted_languages:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: integer
              name:
                type: string
              ext:
                type: string
          description: Allowed languages, or null if all are allowed
        tag_ids:
          type: array
          items:
            type: integer
        group_ids:
          type: array
          items:
            type: integer
        has_statement:
          type: boolean
        has_attachment:
          type: boolean
      required:
      - id
      - name
      - full_name
      - available
      - live_dataset_id

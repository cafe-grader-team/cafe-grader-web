# Failsafe for stuck viva placeholder turns. Most failures are caught
# by Llm::RequestJob (retry_on + perform's rescue) which mark the
# placeholder :error directly. This sweeper exists for the residual
# cases — worker killed mid-call, OOM, etc. — where neither path runs.
# See VivaTurn.fail_stale!.
#
# Registered in both envs: the cost is one indexed query every 5
# minutes, and in development an unrecoverable LLM-job failure
# otherwise leaves the developer staring at "Interviewer is thinking..."
# with no path forward.
development:
  viva_turn_failsafe:
    command: "VivaTurn.fail_stale!"
    schedule: every 5 minutes

production:
  audit_log_cleanup:
    command: "AuditLog.cleanup!"
    schedule: at 3am every day
  viva_turn_failsafe:
    command: "VivaTurn.fail_stale!"
    schedule: every 5 minutes
  # Moved here from config/schedule.rb (whenever). Both run nightly
  # housekeeping that's safe to skip a day if Solid Queue is down.
  # cleanup_web purges old Job rows + compiled-file blobs;
  # cleanup_judge rm -rf's isolate submission dirs older than 24h.
  grader_cleanup_web:
    command: "Grader.cleanup_web"
    schedule: at 2am every day
  grader_cleanup_judge:
    command: "Grader.cleanup_judge"
    schedule: at 2am every day
